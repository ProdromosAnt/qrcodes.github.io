<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>PDF Καταστημάτων</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <style>
        body {
            background: #0f172a;
            color: #e5e7eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        .navbar {
            background: #020617;
        }

        .navbar-brand {
            color: #38bdf8 !important;
            font-weight: bold;
        }

        .card {
            background: #1e293b;
            border: none;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .card-title {
            color: #38bdf8;
            font-weight: bold;
        }

        .btn-pdf {
            background: linear-gradient(45deg, #06b6d4, #3b82f6);
            border: none;
            color: white;
        }

        .btn-pdf:hover {
            background: linear-gradient(45deg, #0891b2, #2563eb);
        }

        footer {
            margin-top: 40px;
            padding: 20px;
            text-align: center;
            color: #94a3b8;
        }
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand">📄 PDF Καταστημάτων</span>
    </div>
</nav>

<!-- Content -->
<div class="container mt-4">
    <div class="row g-4">

        <!-- Κατάστημα 1 -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5 class="card-title">Κατάστημα 1</h5>
                <a href="pdf24_converted.pdf" target="_blank" class="btn btn-pdf w-100 mb-2">
                    Τιμοκατάλογος
                </a>
                <a href="pdfs/store1-file2.pdf" target="_blank" class="btn btn-pdf w-100">
                    Προσφορές
                </a>
            </div>
        </div>

        <!-- Κατάστημα 2 -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5 class="card-title">Κατάστημα 2</h5>
                <a href="pdfs/store2-file1.pdf" target="_blank" class="btn btn-pdf w-100 mb-2">
                    Κατάλογος
                </a>
                <a href="sample_menu.pdf" target="_blank" class="btn btn-pdf w-100">
                    Τιμές
                </a>
            </div>
        </div>

        <!-- Κατάστημα 3 -->
        <div class="col-md-4">
            <div class="card p-3">
                <h5 class="card-title">Κατάστημα 3</h5>
                <a href="pdfs/store3.pdf" target="_blank" class="btn btn-pdf w-100">
                    Προϊόντα
                </a>
            </div>
        </div>

    </div>
</div>

<!-- Footer -->
<footer>
    © 2026 - Dashboard PDF
</footer>

</body>
</html>
