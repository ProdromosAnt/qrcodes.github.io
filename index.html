
<!DOCTYPE html>
<html lang="el">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Καταστημάτων</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #333;
        }

        .container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .store-title {
            font-size: 20px;
            margin-bottom: 10px;
            color: #222;
        }

        .pdf-link {
            display: block;
            margin: 5px 0;
            padding: 10px;
            background: #0078d7;
            color: white;
            text-align: center;
            border-radius: 8px;
            text-decoration: none;
            transition: 0.2s;
        }

        .pdf-link:hover {
            background: #005fa3;
        }
    </style>
</head>

<body>

<h1>PDF Καταστημάτων</h1>

<div class="container">

    <!-- Κατάστημα 1 -->
    <div class="card">
        <div class="store-title">Κατάστημα 1</div>
        <a class="pdf-link" href="pdfs/store1-file1.pdf" target="_blank">Τιμοκατάλογος</a>
        <a class="pdf-link" href="pdfs/store1-file2.pdf" target="_blank">Προσφορές</a>
    </div>

    <!-- Κατάστημα 2 -->
    <div class="card">
        <div class="store-title">Κατάστημα 2</div>
        <a class="pdf-link" href="pdfs/store2-file1.pdf" target="_blank">Τιμοκατάλογος</a>
        <a class="pdf-link" href="pdfs/store2-file2.pdf" target="_blank">Κατάλογος</a>
    </div>

    <!-- Κατάστημα 3 -->
    <div class="card">
        <div class="store-title">Κατάστημα 3</div>
        <a class="pdf-link" href="pdfs/store3.pdf" target="_blank">Προϊόντα</a>
    </div>

</div>

</body>
</html>
